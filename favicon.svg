<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2e1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- Outer ring (track) -->
  <circle cx="50" cy="50" r="36"
    fill="none"
    stroke="rgba(255,255,255,0.06)"
    stroke-width="5"/>

  <!-- Progress arc (~75% complete) -->
  <circle cx="50" cy="50" r="36"
    fill="none"
    stroke="url(#ringGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-dasharray="170 226"
    stroke-dashoffset="56.5"
    filter="url(#glow)"
    transform="rotate(-90 50 50)"/>

  <!-- Dot at arc end -->
  <circle cx="50" cy="14" r="3.5" fill="#2ecc71" filter="url(#glow)"
    transform="rotate(163 50 50)"/>

  <!-- Hourglass icon center -->
  <g transform="translate(50,50)">
    <!-- Top triangle -->
    <polygon points="-9,-12 9,-12 0,0" fill="#2ecc71" opacity="0.95"/>
    <!-- Bottom triangle -->
    <polygon points="-9,12 9,12 0,0" fill="#2ecc71" opacity="0.6"/>
    <!-- Top bar -->
    <rect x="-10" y="-14" width="20" height="3" rx="1.5" fill="#2ecc71"/>
    <!-- Bottom bar -->
    <rect x="-10" y="11" width="20" height="3" rx="1.5" fill="#2ecc71" opacity="0.8"/>
    <!-- Sand dot falling -->
    <circle cx="0" cy="4" r="1.8" fill="#fff" opacity="0.7"/>
  </g>
</svg>
